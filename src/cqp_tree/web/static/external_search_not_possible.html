<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>CQP/Tree translator</title>
</head>

<body>
<div class="container">
    <div class="row justify-content-center min-vh-100">
        <div class="col-md-10 col-lg-8">
            <div class="d-flex align-items-center vh-100">
                <div>

                    <h1>We're sorry!</h1>


                    <p class="my-5">
                        We cannot automatically figure out the corpus you want to search on.
                        Please create an issue on our GitHub and provide the URL you used for your corpus.
                        It is the URL shown in the code block below:
                    </p>

                    <pre>
                            {{ url }}
                        </pre>

                    <div class="my-10">
                        <a href="https://github.com/Niklas-Deworetzki/cqp-tree/issues/new/choose">
                            Click here to report an issue on GitHub.
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
